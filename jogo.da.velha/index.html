<!DOCTYPE html>
<html>
<head>
    <style>
        .cell {
            height: 160px;
            width: 160px;
            border: 1px solid;
            text-align: center;
            vertical-align: middle;
            line-height: 160px;
            cursor: pointer;
        }
        .X {
            color: red;
        }
        .O {
            color: blue;
        }
        table {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <table id="board"></table>
    <button onclick="resetBoard()">Reset</button>
    <p id="message"></p>

    <script>
        var board = Array(3).fill().map(() => Array(3).fill(''));
        var currentPlayer = 'X';
        var gameOver = false;

        function cellClicked(row, col) {
            if (gameOver || board[row][col] !== '') return;
            board[row][col] = currentPlayer;
            var cell = document.getElementById(row + '-' + col);
            cell.innerText = currentPlayer;
            cell.classList.add(currentPlayer);
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            checkGame();
        }

        function checkGame() {
            for (let i = 0; i < 3; i++) {
                if (board[i][0] !== '' && board[i][0] === board[i][1] && board[i][0] === board[i][2]) {
                    gameOver = true;
                    document.getElementById('message').innerText = 'Player ' + board[i][0] + ' wins!';
                }
                if (board[0][i] !== '' && board[0][i] === board[1][i] && board[0][i] === board[2][i]) {
                    gameOver = true;
                    document.getElementById('message').innerText = 'Player ' + board[0][i] + ' wins!';
                }
            }
            if (board[0][0] !== '' && board[0][0] === board[1][1] && board[0][0] === board[2][2]) {
                gameOver = true;
                document.getElementById('message').innerText = 'Player ' + board[0][0] + ' wins!';
            }
            if (board[0][2] !== '' && board[0][2] === board[1][1] && board[0][2] === board[2][0]) {
                gameOver = true;
                document.getElementById('message').innerText = 'Player ' + board[0][2] + ' wins!';
            }
            if (!gameOver && !board.flat().includes('')) {
                gameOver = true;
                document.getElementById('message').innerText = 'The game is a draw!';
            }
        }

        function resetBoard() {
            board = Array(3).fill().map(() => Array(3).fill(''));
            currentPlayer = 'X';
            gameOver = false;
            document.getElementById('message').innerText = '';
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerText = '';
                cell.classList.remove('X', 'O');
            });
        }

        window.onload = function() {
            var table = document.getElementById('board');
            for (let i = 0; i < 3; i++) {
                var row = table.insertRow();
                for (let j = 0; j < 3; j++) {
                    var cell = row.insertCell();
                    cell.id = i + '-' + j;
                    cell.classList.add('cell');
                    cell.onclick = () => cellClicked(i, j);
                }
            }
        }
    </script>
</body>
</html>
